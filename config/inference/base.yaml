# --- Vision ML System: Inference Configuration ---

model:
  name: yolo11n
  pretrained: true
  num_classes: 1  # Person class only for visitor analytics
  task: detect
  # Model precision — output format is IDENTICAL across all options
  precision: fp32  # 'fp32' or 'fp16'
  # fp32: Default. Works on CPU + GPU. Full precision. Models cached in ~/.cache/yolo/
  # fp16: GPU-only (CUDA). ~2x faster, ~50% less VRAM. Falls back to fp32 on CPU.
  # Note: INT8 requires TensorRT (GPU-only, complex). For portfolio, use FP32.

# Detector factory configuration
detection:
  detector_type: yolo11n  # 'yolo11n', 'yolo11s', 'yolo11m', 'yolo11l', 'yolo11x', 'rfdetr'
  primary_detector: yolo11n    # For dual-detector mode
  secondary_detector: rfdetr   # For dual-detector mode (fallback for low-confidence)
  # Dual detector modes:
  #   false:     Hot path — primary detector only, minimal overhead, fastest inference
  #   inline:    Dual detector runs during inference (real-time), slower but immediate feedback
  #   batch:     Dual detector disabled during inference; run separately via batch job
  use_dual_detector: batch     # false | 'inline' | 'batch'
  dual_confidence_threshold: 0.5  # Primary detections below this → check secondary detector
  # Low-confidence frame saving (for batch secondary detector analysis)
  save_low_confidence_frames: true  # Save frames where primary < dual_confidence_threshold
  low_confidence_dir: data/low_confidence_frames

inference:
  confidence_threshold: 0.35
  iou_threshold: 0.45
  device: cpu  # 'cpu' or 'cuda' or 'cuda:0'
  classes: [0]  # COCO person class

# Online = real-time stream (webcam/RTSP), Offline = batch video file
mode:
  type: offline  # 'online' or 'offline'
  source: null   # Path to video file (offline) or stream URL / camera index (online)
  output_dir: runs/inference
  save_video: true
  show_live: false  # Display live window (online mode)

# Tracker selection and configuration
tracking:
  enabled: true
  tracker_type: bytetrack  # 'bytetrack', 'botsort', 'ocsort'
  track_thresh: 0.25       # Detection threshold for creating new tracks
  track_buffer: 30         # Frames to keep lost tracks alive
  match_thresh: 0.8        # IoU threshold for matching detections to tracks
  frame_rate: 30           # Video frame rate (for time-based calculations)

# Supervision annotator settings
annotation:
  bounding_box:
    enabled: true
    thickness: 2
    color: null  # null = auto color palette
  label:
    enabled: true
    text_scale: 0.5
    text_thickness: 1
  trace:
    enabled: true
    trace_length: 60
  heatmap:
    enabled: false
    opacity: 0.5

# Auto-labeling (active learning)
# Collects low-confidence frames saved by DualDetector and labeled by RF-DETR.
# Focus: frames where model struggles (failures).
labeling:
  enabled: true
  provider: roboflow          # 'roboflow' or 'local'
  roboflow_api_key: null      # Set via env var ROBOFLOW_API_KEY
  roboflow_workspace: thomas-workspace
  roboflow_project: vision_ml_system

# Drift detection during inference
drift:
  enabled: true
  method: confidence_drop
  confidence_threshold: 0.3
  window_size: 500
  check_interval: 100

# Visitor analytics settings
analytics:
  enabled: true
  count_unique_visitors: true
  compute_dwell_time: true
  dwell_time_fps: 30
  output_json: true
